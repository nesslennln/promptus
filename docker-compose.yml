services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: promptus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/promptus_db
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
      ADMIN_PASSWORD: nesslol2020
      # Pon tu key real en backend/.env (local) para pruebas fuera de Docker.
      # Si quieres correr evaluate dentro de Docker, puedes setearla aquí:
      # CLAUDE_API_KEY: "sk-ant-..."
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data: {}
