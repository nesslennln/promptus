services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: promptus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/promptus_db
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
      ADMIN_PASSWORD: nesslol2020
    CLAUDE_API_KEY: "sk-ant-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"
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data: {}
